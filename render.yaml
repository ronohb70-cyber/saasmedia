services:
  # ── Next.js Web Frontend ────────────────────────────────────────────────
  - type: web
    name: social-web
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start --filter=web
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: social-api
          property: url

  # ── NestJS API Server ───────────────────────────────────────────────────
  - type: web
    name: social-api
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push --schema=packages/database/prisma/schema.prisma
    startCommand: npm run start:prod --filter=api
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: social-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: social-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: social-redis
          property: port
      - key: JWT_SECRET
        generateValue: true

  # ── NestJS Background Worker ────────────────────────────────────────────
  - type: worker
    name: social-worker
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod --filter=worker
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: social-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: social-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: social-redis
          property: port

  # ── Redis Instance (For BullMQ) ─────────────────────────────────────────
  - type: redis
    name: social-redis
    plan: free
    ipAllowList: [] # Allow internal access only

databases:
  - name: social-db
    plan: free
